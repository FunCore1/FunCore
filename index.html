<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logomin.png">
    <title>FunCore</title>
</head>
<body>
<header class="header">
  <div class="container">

    <!-- Logo -->
    <a class="logo">
      <img src="assets/logomin.png" alt="logo">
      <span>FunCore</span>
    </a>

    <!-- Nav -->
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Beta</a>
    </nav>

    <!-- Button -->
    <button class="btn">
      Get Started →
    </button>

  </div>
</header>
<section class="section">
  <div class="container">

    <!-- Tools Development -->
    <div class="card">
      <span class="tag">TOOLS</span>
      <img src="assets/tools.png" alt="AI tools">
      <h2>Tools Development</h2>
      <p>
        Build powerful tools. 
        FunCore1 focuses on creating useful tools for productivity and real-world applications.
      </p>
      <a href="#">Explore Tools →</a>
    </div>

    <!-- Games Development -->
    <div class="card">
      <span class="tag">GAMES</span>
      <img src="assets/games.png" alt="Games">
      <h2>Games</h2>
      <p>
        FunCore also provides some fun games.
        You can explore variety of games on FunCore.
      </p>
      <a href="#">Explore Games →</a>
    </div>

  </div>
</section>
</body>
</html>
